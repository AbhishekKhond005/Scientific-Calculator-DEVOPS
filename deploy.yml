- hosts: localhost
  connection: local
  gather_facts: no

  tasks:
    - name: Pull latest Docker image
      command: docker pull abhishekkhond/scientific-calculator

    - name: Stop existing container
      command: docker stop scientific-calculator
      ignore_errors: yes

    - name: Remove old container
      command: docker rm scientific-calculator
      ignore_errors: yes

    - name: Run container
      command: docker run -dit --name scientific-calculator abhishekkhond/scientific-calculator